services:
  - type: web
    name: pos-backend
    env: node
    rootDir: server
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    plan: free
    envVars:
      - key: PORT
        value: "5001"
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: FRONTEND_URL
        fromService:
          type: web
          name: pos-frontend
          envVarKey: RENDER_EXTERNAL_URL

  - type: web
    name: pos-frontend
    env: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: pos-backend
          envVarKey: RENDER_EXTERNAL_URL
      - key: VITE_API_URL
        fromService:
          type: web
          name: pos-backend
          envVarKey: RENDER_EXTERNAL_URL
      - key: VITE_GOOGLE_CLIENT_ID
        fromService:
          type: web
          name: pos-backend
          envVarKey: GOOGLE_CLIENT_ID
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
